<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Administrador - Simbiose</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light pt-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white py-3 border-bottom">
                        <h5 class="fw-bold mb-0 text-primary">Cadastrar Novo Membro</h5>
                    </div>
                    <div class="card-body p-4">
                        <form>

                            <div class="mb-3">
                                <label class="form-label">Nome Completo</label>
                                <input name="Nome" class="form-control" placeholder="Ex: João da Silva" required />
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Número de Registro (Login)</label>
                                    <input name="NumeroRegistro" class="form-control" placeholder="Ex: 12345" maxlength="5" required />
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Senha de Acesso</label>
                                    <input name="Senha" type="text" class="form-control" placeholder="Ex: Senha123" required />
                                    <small class="text-muted">Informe esta senha ao novo admin.</small>
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="button" class="btn btn-primary fw-bold">SALVAR ADMINISTRADOR</button>
                                <a href="#" class="btn btn-link text-muted text-decoration-none">Cancelar</a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
